<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sidebar</title>
    <link rel="stylesheet" href="dashboard.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/lykmapipo/themify-icons@0.1.2/css/themify-icons.css">
</head>
<body>

    <input type="checkbox" id="check">

    <header>
        <label for="check">
            <i class="ti-menu" id="sidebar_btn"></i>
        </label>
        <div class="left_area">
            <h2>LAND</h2>
        </div>
        <div class="right_area">
            <button><a href="index.html">logout</a></button>
        </div>
    </header>

    <div class="sidebar">
        <center>
            <img src="image/land.jpeg" class="land_img" alt="Land_law">
        </center>
        <a href="#"><i class="ti-home"></i><span>Home</span></a>
        <a href="#"><i class="ti-file"></i><span>Cases</span></a>
        <a href="#"><i class="ti-reload"></i><span>Pending</span></a>
        <a href="#"><i class="ti-check-box"></i><span>Solved</span></a>
    </div>

    <div class="main-content">
        <div class="cards">
              <div class="card">
                <i class="ti-file"></i>
                <div>
                 <p>150</p>
                 <h3>Cases</h3>
                </div>
            </div>
            <div class="card">
                <i class="ti-reload"></i>
                <div>
                 <p>97</p>
                 <h3>Pending</h3>
                </div>
            </div>
            <div class="card">
                <i class="ti-check-box"></i>
                <div>
                 <p>53</p>
                 <h3>Solved</h3>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
