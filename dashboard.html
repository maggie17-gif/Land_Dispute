<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="dashboard.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/lykmapipo/themify-icons@0.1.2/css/themify-icons.css">
</head>
<body>
   <div class="sidebar">
    <div class="sidebar-brand"> 
        <h2> 
            <img src="image/images.png" alt="LAND"> Land</h2> 
            <i class="ti-menu-alt"></i>
    </div>
    <div class="sidebar-menu">
        <ul>
            <li><i class="ti-home"></i><a href="#">Home</a></li>
            <li><i class="ti-file"></i><a href="#">Cases</a></li>
            <li><i class="ti-reload"></i><a href="#">Pending</a></li>
            <li><i class="ti-check-box"></i><a href="#">Solved</a></li>
        </ul>
    </div>
   </div> 
   <div class="main-content">
    <header>
        <h2><label for=""></label>Dashboard</h2>
        <div class="search-tool">
            <i class="ti-search"></i>
            <input type="search" placeholder="Search Here">
        </div>
        <div class="user-path">
            <h4> <i class="ti-user"></i>Jane Doe</h4>
            <p><small>User Admin</small></p>
        </div>
    </header>
    <main>
        <div class="cards">
            <div class="card">
                <i class="ti-file"></i>
                <div>
                 <p>150</p>
                 <h3>Cases</h3>
                </div>
            </div>
            <div class="card">
                <i class="ti-reload"></i>
                <div>
                 <p>97</p>
                 <h3>Pending</h3>
                </div>
            </div>
            <div class="card">
                <i class="ti-check-box"></i>
                <div>
                 <p>53</p>
                 <h3>Solved</h3>
                </div>
            </div>
        </div>
    </main>
   </div>
</body>
</html>
