<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{background-color: powderblue;}
        h1{color: blue;}
        p{color: red;}
        table,th,td{border: 1px solid black;}
    </style>
</head>
<body>
    <img src="Ardhi logo.jpeg" alt="Ardhi">
    <h1 style="background-color: powderblue;color: blue;font-family: Verdana, Geneva, Tahoma, sans-serif;">Text Formatting</h1>
    <p style="text-align: center;font-size: 20px;">This is an important <strong>message</strong></p>
    <p>Please read it <em>carefully</em></p>
    <p style="border: 2px solid mediumseagreen;">Do not forget to <mark>pray</mark> everyday</p>
    <p>take H<sub>2</sub>O frequently.</p>
    

    <table>
        <tr>
            <th>S/N</th>
            <th>Name</th>
            <th>Age</th>
        </tr>
        <tr>
            <td>1</td>
            <td>John Doe</td>
            <td>19</td>
        </tr>
        <tr>
            <td>2</td>
            <td>Jane Doe</td>
            <td>22</td>
        </tr>
    </table>

    <ul>
        <li>tea</li>
        <li>milk</li>
        <li>coffe</li>
    </ul>

    <ol>
        <li>wake up</li>
        <li>pray</li>
        <li>prepare yourself</li>
        <li>go to work</li>
    </ol>
</body>
</html>
